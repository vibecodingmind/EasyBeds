[variables]
PRISMA_CLI_QUERY_ENGINE_TYPE = "library"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install"]

[phases.build]
cmds = ["bunx prisma generate", "bun run build"]

[start]
cmd = "npx prisma db push && node .next/standalone/server.js"
