[build]
builder = "nixpacks"
buildCommand = "npm install -g bun && bun install && ./node_modules/.bin/prisma generate && bun run build"

[deploy]
startCommand = "bunx prisma migrate deploy && bun .next/standalone/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/api"
healthcheckTimeout = 120

[[services]]
name = "easybeds"
