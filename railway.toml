[build]
builder = "nixpacks"
buildCommand = "bun install && bun run db:generate && bun run build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && node .next/standalone/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 300

[[services]]
name = "easybeds"
