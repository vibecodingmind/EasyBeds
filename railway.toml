[build]
builder = "nixpacks"
buildCommand = "npm install -g bun && bun install && npx prisma generate && bun run build"

[deploy]
startCommand = "npx prisma migrate deploy; bun .next/standalone/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/api"
healthcheckTimeout = 60

[[services]]
name = "easybeds"
